# NIST AI RMF Assessment Checklist
#
# Purpose: Machine-readable checklist for assessing AI systems against the NIST AI RMF
#          Four Functions and Seven Characteristics of Trustworthy AI. This checklist
#          must be completed for every new AI project before proceeding through
#          governance gates.
#
# When to Use:
#   - At project initiation (Discovery Gate)
#   - Before development begins (Development Gate)
#   - Before production deployment (Deployment Gate)
#   - During quarterly governance reviews
#   - When significant changes are made to the AI system
#
# Who Is Responsible:
#   | Role                    | R/A/C/I     | Responsibility                              |
#   |-------------------------|-------------|---------------------------------------------|
#   | Product Owner           | Accountable | Overall assessment completion               |
#   | ML/AI Engineer          | Responsible | Technical assessments (Measure, Secure)     |
#   | Ethics/Risk Lead        | Responsible | Risk assessments (Map, Fair)                |
#   | Governance Lead         | Responsible | Governance assessments (Govern, Accountable)|
#   | Security Engineer       | Responsible | Security assessments (Secure, Resilient)  |
#   | Legal Counsel           | Consulted   | Regulatory interpretation                   |
#
# Regulatory Basis:
#   - NIST AI RMF 1.0 — Four Functions (Govern, Map, Measure, Manage)
#   - NIST AI RMF — Seven Characteristics of Trustworthy AI
#   - EO 14110 — Executive Order on Safe, Secure, and Trustworthy AI
#   - EU AI Act Article 9 — Risk Management System
#   - ISO/IEC 42001 — AI Management System
#
# Cross-References:
#   - NIST AI RMF Reference Guide: ../../05-cross-cutting/nist-ai-rmf-reference-guide.md
#   - ML Lifecycle Canvas (NIST Edition): ../../00-getting-started/ml-lifecycle-canvas-nist-edition.md
#   - SAFEST to NIST Mapping: ../../../protolabs/nist-ai-rmf-safest-mapping.md
#   - EU AI Act Risk Classification: ./eu-ai-act-risk-classification.yaml

metadata:
  checklist_id: "NIST-AI-RMF-001"
  version: "1.0"
  last_updated: "2026-04-23"
  owner: "AI Governance Office"
