# =============================================================================
# ProtoLabs AI Governance Quick Assessment Checklist
# =============================================================================
# Purpose:  Self-assessment to determine your organisation's starting point
#           and recommended risk tier within the ProtoLabs AI Governance
#           Framework for Agentic DFM Workflows in Regulated Manufacturing.
#
# Scope:    This assessment covers the 10 DFM agents (CNC machining, injection
#           molding, sheet metal, 3D printing, materials selection, plus
#           aerospace, medical, automotive verticals, trends/strategy, and
#           the dfm-router). It evaluates governance maturity across six
#           categories: Governance, Risk Exposure, Regulatory Requirements,
#           Technical Capability, Organisational Readiness, and Agentic AI.
#
# How to use:
#   1. Answer each question honestly based on current state (not aspirational).
#   2. Record the score for each answer.
#   3. Sum total score and consult the scoring section at the bottom.
#   4. Provide objective evidence for at least one question per category.
#   5. Follow the recommended starting path.
#
# Cross-references:
#   - 05-cross-cutting/regulatory-reference-index.md (regulatory context)
#   - 01-discovery-governance/templates/governance-charter.md (governance structure)
#   - 01-discovery-governance/templates/risk-management-plan.md (risk management)
# =============================================================================

metadata:
  title: "ProtoLabs AI Governance Quick Assessment Checklist"
  version: "2.0"
  date: "2026-04-23"
  framework: "ProtoLabs AI Governance Framework for Agentic DFM Workflows"
  owner: "ProtoLabs AI Governance Office"
  review_cycle: "Semi-annually"
  instructions: |
    For each question, select the answer option (a, b, or c) that best
    describes your organisation's CURRENT state. Be honest --- this assessment
    is for internal planning, not external reporting. Record the numeric score
    next to your chosen answer. Sum all scores to determine your recommended
    starting path and risk tier.
    
    This assessment covers 27 questions across 6 categories (A-F). Categories
    A-E are foundational governance; Category F is agentic-AI-specific and
    applies to organisations deploying LLM-based agents with tool-use,
    multi-agent orchestration, and knowledge-base grounding.

# =============================================================================
# Assessment Questions
# =============================================================================

questions:

  # ---------------------------------------------------------------------------
  # Category A: Governance Maturity (Questions 1-5)
  # ---------------------------------------------------------------------------

  - id: Q01
    category: governance_maturity
    question: "Does your organisation have a formal AI governance policy or charter?"
    options:
      a:
        text: "No policy exists; AI adoption is ad-hoc"
        score: 0
      b:
        text: "Informal guidelines exist but are not enforced or documented"
        score: 1
      c:
        text: "A formal, board-approved AI governance charter is in place and reviewed periodically"
        score: 3
    recommendation:
      if_a: "Start with 01-foundations/governance-charter.md to establish baseline governance."
      if_b: "Formalise existing guidelines using 01-foundations/governance-charter.md as a template."
      if_c: "Review charter against ISO/IEC 42001 Clause 5."

  - id: Q02
    category: governance_maturity
    question: "Are roles and responsibilities for AI development, deployment, and oversight clearly defined?"
    options:
      a:
        text: "No defined roles; developers make their own decisions"
        score: 0
      b:
        text: "Some roles are defined but gaps exist (e.g., no model risk owner)"
        score: 1
      c:
        text: "Comprehensive RACI matrix covering all AI lifecycle stages is maintained"
        score: 3
    recommendation:
      if_a: "Use 01-foundations/roles-and-responsibilities.md to define core roles."
      if_b: "Fill gaps using the roles-and-responsibilities.md actor identification process."
      if_c: "Verify coverage includes NHI/machine-identity roles per 05-cross-cutting/machine-identity-nhi.md."

  - id: Q03
    category: governance_maturity
    question: "Is there an escalation path for AI-related incidents or ethical concerns?"
    options:
      a:
        text: "No escalation path; issues are handled informally"
        score: 0
      b:
        text: "Escalation path exists for major incidents but not for ethical concerns"
        score: 1
      c:
        text: "Documented escalation policy covers technical incidents, ethical concerns, and regulatory events"
        score: 3
    recommendation:
      if_a: "Establish escalation policy using 04-operational-governance/templates/ai-incident-report.md."
      if_b: "Extend coverage to ethical and regulatory scenarios per SAFEST Accountability pillar."
      if_c: "Test escalation paths through tabletop exercises quarterly."

  - id: Q04
    category: governance_maturity
    question: "How does your organisation track compliance with AI-relevant regulations?"
    options:
      a:
        text: "No systematic tracking; compliance is reactive"
        score: 0
      b:
        text: "Spreadsheet-based tracking exists for some regulations"
        score: 1
      c:
        text: "Comprehensive compliance trackers aligned to a regulatory reference index are maintained"
        score: 3
    recommendation:
      if_a: "Start with 05-cross-cutting/regulatory-reference-index.md to identify applicable regulations."
      if_b: "Migrate to structured trackers in 06-compliance/trackers/."
      if_c: "Ensure quarterly review cadence per the regulatory-reference-index maintenance schedule."

  - id: Q05
    category: governance_maturity
    question: "Does your organisation conduct management reviews of AI systems?"
    options:
      a:
        text: "No management reviews of AI systems"
        score: 0
      b:
        text: "Reviews happen ad-hoc when problems arise"
        score: 1
      c:
        text: "Scheduled management reviews with documented outcomes per ISO 42001 Clause 9"
        score: 3
    recommendation:
      if_a: "Institute quarterly AI review meetings using ISO 42001 Clause 9 as guide."
      if_b: "Move to a scheduled cadence with standardised reporting."
      if_c: "Integrate drift detection metrics (04-operational-governance/templates/drift-detection-runbook.md) into review inputs."

  # ---------------------------------------------------------------------------
  # Category B: Risk Exposure (Questions 6-10)
  # ---------------------------------------------------------------------------

  - id: Q06
    category: risk_exposure
    question: "Do your AI agents make or influence decisions with legal or financial consequences for individuals?"
    options:
      a:
        text: "Yes, agents make autonomous decisions affecting credit, payments, or investment"
        score: 3
      b:
        text: "Agents provide recommendations that humans review before action"
        score: 1
      c:
        text: "Agents perform only low-risk tasks (content generation, internal summarisation)"
        score: 0
    recommendation:
      if_a: "Classify as high-risk per EU AI Act Art 6; full framework adoption required."
      if_b: "Standard path; ensure human-oversight protocol is robust."
      if_c: "Minimal path may suffice; focus on transparency and basic guardrails."

  - id: Q07
    category: risk_exposure
    question: "Do your AI agents process personal data of EU residents?"
    options:
      a:
        text: "Yes, including special-category data (health, biometric, financial)"
        score: 3
      b:
        text: "Yes, but only standard personal data (name, email, transaction history)"
        score: 2
      c:
        text: "No personal data is processed by AI agents"
        score: 0
    recommendation:
      if_a: "DPIA mandatory (GDPR Art 35); implement 02-pre-deployment/templates/dpia-template.md."
      if_b: "DPIA likely required; assess necessity per GDPR Art 35 criteria."
      if_c: "Document the basis for this determination; revisit if scope changes."

  - id: Q08
    category: risk_exposure
    question: "Do your AI agents interact directly with retail customers?"
    options:
      a:
        text: "Yes, agents converse with retail clients in real-time"
        score: 3
      b:
        text: "Agents assist internal staff who then interact with clients"
        score: 1
      c:
        text: "Agents are used for internal operations only"
        score: 0
    recommendation:
      if_a: "EU AI Act Art 52 transparency obligations apply; deploy NeMo Guardrails (03-runtime-governance/guides/integrating-nemo-guardrails.md)."
      if_b: "Ensure internal users understand AI limitations; implement output validation."
      if_c: "Lower risk but still ensure traceability for internal audit."

  - id: Q09
    category: risk_exposure
    question: "Do your AI agents have tool-use capabilities (API calls, database writes, transactions)?"
    options:
      a:
        text: "Yes, agents can execute financial transactions or modify records autonomously"
        score: 3
      b:
        text: "Agents can call read-only APIs but cannot write or transact"
        score: 1
      c:
        text: "Agents have no tool-use capabilities (pure text generation)"
        score: 0
    recommendation:
      if_a: "High-risk agentic pattern; implement full runtime guardrails, NHI controls, and red-teaming."
      if_b: "Moderate risk; ensure data provenance tracking and access controls."
      if_c: "Focus on output quality and hallucination prevention."

  - id: Q10
    category: risk_exposure
    question: "Are your AI systems using third-party models (OpenAI, Anthropic, open-source)?"
    options:
      a:
        text: "Yes, we rely on third-party hosted models (API-based)"
        score: 2
      b:
        text: "We use open-source models we host and fine-tune ourselves"
        score: 1
      c:
        text: "We develop all models in-house from scratch"
        score: 0
    recommendation:
      if_a: "Third-party risk assessment required; see 02-development-governance/templates/third-party-model-assessment.md and NIST CSF 2.0 GV.SC (supply chain risk management)."
      if_b: "Ensure supply-chain integrity; track model provenance."
      if_c: "Full model governance applies; document per EU AI Act Art 11."

  # ---------------------------------------------------------------------------
  # Category C: Regulatory Requirements (Questions 11-14)
  # ---------------------------------------------------------------------------

  - id: Q11
    category: regulatory_requirements
    question: "Does your organisation operate in regulated manufacturing verticals?"
    options:
      a:
        text: "Yes, aerospace (AS9100D), medical (ISO 13485/FDA), or defense (ITAR/EAR)"
        score: 3
      b:
        text: "Yes, general manufacturing with environmental compliance (RoHS, REACH, IATF 16949)"
        score: 2
      c:
        text: "No regulated verticals; general prototyping and production"
        score: 0
    recommendation:
      if_a: "Full ITAR/EAR, AS9100D, or FDA 21 CFR 820 compliance required. See 05-cross-cutting/regulatory-reference-index.md Band B."
      if_b: "Environmental and automotive compliance obligations apply. See 05-cross-cutting/regulatory-reference-index.md Band B."
      if_c: "EU AI Act Art 52 transparency obligations still apply; GDPR applies if processing EU personal data."

  - id: Q12
    category: regulatory_requirements
    question: "Do your AI agents process customer intellectual property (CAD files, proprietary designs)?"
    options:
      a:
        text: "Yes, agents process CAD files and proprietary designs with export-controlled or ITAR markings"
        score: 3
      b:
        text: "Yes, agents process proprietary designs but no export-controlled content"
        score: 2
      c:
        text: "No proprietary designs processed; only generic part descriptions"
        score: 0
    recommendation:
      if_a: "Critical: implement customer-CAD-IP protection guardrail per protolabs/customer-cad-ip-protection-guardrail.md. ITAR/EAR compliance mandatory."
      if_b: "Implement IP protection guardrails and data retention policies. See protolabs/customer-cad-ip-protection-guardrail.md."
      if_c: "Document the basis for this determination; revisit if scope changes to include CAD uploads."

  - id: Q13
    category: regulatory_requirements
    question: "Will your AI system be classified as high-risk under the EU AI Act?"
    options:
      a:
        text: "Yes, or very likely (autonomous quoting, binding production decisions, safety-critical design approval)"
        score: 3
      b:
        text: "Uncertain; a formal classification has not been performed"
        score: 2
      c:
        text: "No; system is advisory only (DFM review, design guidance, material recommendations)"
        score: 0
    recommendation:
      if_a: "Full EU AI Act compliance path; all Chapter III Section 2 obligations apply."
      if_b: "Perform classification using 01-discovery-governance/checklists/eu-ai-act-risk-classification.yaml immediately."
      if_c: "Transparency obligations (Art 52) may still apply; document classification."

  - id: Q14
    category: regulatory_requirements
    question: "Have you conducted a Data Protection Impact Assessment (DPIA) for your AI systems?"
    options:
      a:
        text: "No DPIA has been conducted"
        score: 0
      b:
        text: "A DPIA was conducted but is outdated or incomplete"
        score: 1
      c:
        text: "Current DPIA exists and is reviewed at least annually"
        score: 3
    recommendation:
      if_a: "Use 01-discovery-governance/templates/dpia-template.md; this is likely a legal requirement."
      if_b: "Update DPIA and establish annual review cycle."
      if_c: "Ensure DPIA covers agentic-specific risks (tool-use, multi-agent, NHI)."

  # ---------------------------------------------------------------------------
  # Category D: Technical Capability (Questions 15-18)
  # ---------------------------------------------------------------------------

  - id: Q15
    category: technical_capability
    question: "Do you have observability and tracing for your AI agent pipelines?"
    options:
      a:
        text: "No observability; we cannot trace agent decisions"
        score: 0
      b:
        text: "Basic logging exists but no structured tracing or observability platform"
        score: 1
      c:
        text: "Structured tracing via LangSmith, Arize Phoenix, Opik, Langfuse, or equivalent"
        score: 3
    recommendation:
      if_a: "Critical gap; implement tracing immediately per 04-operational-governance/guides/traceability-with-langchain.md."
      if_b: "Upgrade to structured observability; regulatory audit trails require it."
      if_c: "Ensure traces meet retention requirements; integrate with drift detection."

  - id: Q16
    category: technical_capability
    question: "Do you have guardrails (input/output validation) on your AI agents?"
    options:
      a:
        text: "No guardrails; model outputs are used as-is"
        score: 0
      b:
        text: "Basic content filtering but no structured output validation"
        score: 1
      c:
        text: "Comprehensive guardrails (NeMo, Guardrails AI, or equivalent) with topical, safety, and output validation"
        score: 3
    recommendation:
      if_a: "Urgent; implement NeMo Guardrails (03-runtime-governance/guides/integrating-nemo-guardrails.md) and/or Guardrails AI (03-runtime-governance/guides/integrating-guardrails-ai.md)."
      if_b: "Add structured output validation and manufacturing-specific custom validators (DFM rule validation, material compliance checks)."
      if_c: "Ensure guardrail effectiveness is monitored; integrate with observability."

  - id: Q17
    category: technical_capability
    question: "Do you perform red-teaming or adversarial testing on your AI systems?"
    options:
      a:
        text: "No adversarial testing is performed"
        score: 0
      b:
        text: "Manual testing occurs before release but is not systematic"
        score: 1
      c:
        text: "Automated and manual red-teaming (Noma AI, Straiker, Giskard, or equivalent) runs continuously"
        score: 3
    recommendation:
      if_a: "Start with 04-operational-governance/guides/red-teaming-ai-systems.md; NIST CSF 2.0 PR.DS (data security) and PR.IR (improvement) require resilience testing."
      if_b: "Systematise with automated tools and a regular cadence."
      if_c: "Ensure red-team findings feed into remediation tracking and guardrail updates."

  - id: Q18
    category: technical_capability
    question: "Do you track data provenance and lineage through your AI pipelines?"
    options:
      a:
        text: "No data lineage tracking; we do not know what data influenced agent decisions"
        score: 0
      b:
        text: "Partial lineage exists for training data but not for runtime context/RAG sources"
        score: 1
      c:
        text: "Full provenance tracking from data source through agent pipeline to output"
        score: 3
    recommendation:
      if_a: "Implement data lineage per 05-cross-cutting/data-provenance-and-lineage.md; EU AI Act Art 10 requires it."
      if_b: "Extend to runtime data (RAG retrieval, tool outputs, context injection)."
      if_c: "Ensure provenance metadata is included in audit trail exports."

  # ---------------------------------------------------------------------------
  # Category E: Organisational Readiness (Questions 19-20)
  # ---------------------------------------------------------------------------

  - id: Q19
    category: organisational_readiness
    question: "Does your organisation have AI-specific training and awareness programmes?"
    options:
      a:
        text: "No AI-specific training exists"
        score: 0
      b:
        text: "Ad-hoc training for technical teams only"
        score: 1
      c:
        text: "Role-based AI training for technical, business, and oversight roles"
        score: 3
    recommendation:
      if_a: "Develop training plan per 07-enterprise-implementation/training-curriculum.md; ISO/IEC 42001 Clause 7 (support) requires competence and awareness."
      if_b: "Extend to non-technical roles; include AI governance awareness."
      if_c: "Ensure training covers agentic-specific topics (NHI, tool-use risks, guardrails)."

  - id: Q20
    category: organisational_readiness
    question: "Does your organisation treat AI agents as machine identities within IAM?"
    options:
      a:
        text: "No; agents use shared service accounts or developer credentials"
        score: 0
      b:
        text: "Agents have dedicated service accounts but no lifecycle management"
        score: 1
      c:
        text: "Agents are managed as Non-Human Identities (NHI) with provisioning, rotation, RBAC, and deprovisioning"
        score: 3
    recommendation:
      if_a: "Critical security gap; see 05-cross-cutting/machine-identity-nhi.md."
      if_b: "Implement NHI lifecycle management (NIST CSF 2.0 ID.AM asset management)."
      if_c: "Ensure NHI inventory is integrated with CMDB and agent registry."

  # ---------------------------------------------------------------------------
  # Category F: Agentic AI Governance (Questions F1-F7)
  # ---------------------------------------------------------------------------

  - id: F01
    category: agentic_governance
    question: "Do your agents have documented skill manifests and capability boundaries?"
    options:
      a:
        text: "No skill manifests; agent capabilities are implicit in code"
        score: 0
      b:
        text: "Informal skill descriptions exist but no formal manifests or boundary definitions"
        score: 1
      c:
        text: "Formal skill-manifest.yaml files define capabilities, forbidden actions, and delegation rules for each agent"
        score: 3
    recommendation:
      if_a: "Create skill manifests per agent. See protolabs/agents/<agent-id>/skill-manifest.yaml templates."
      if_b: "Formalise skill manifests and add capability boundary definitions (what the agent CANNOT do)."
      if_c: "Review manifests quarterly; update when agent capabilities change."

  - id: F02
    category: agentic_governance
    question: "Do you have a documented tool-use registry and access controls for agent tools?"
    options:
      a:
        text: "No tool-use registry; agents can invoke any available tool without restriction"
        score: 0
      b:
        text: "Some tools are documented but no formal registry or RBAC controls"
        score: 1
      c:
        text: "Formal tool-use registry with RBAC, audit logging, and principle of least privilege for each agent"
        score: 3
    recommendation:
      if_a: "Create tool-use registry documenting every tool each agent can invoke."
      if_b: "Add RBAC controls and audit logging to tool invocations."
      if_c: "Review tool permissions quarterly; revoke unused tool access."

  - id: F03
    category: agentic_governance
    question: "Do you enforce knowledge-base grounding contracts with source citation requirements?"
    options:
      a:
        text: "No grounding contract; agent outputs are not required to cite sources"
        score: 0
      b:
        text: "Source citation is encouraged but not enforced or validated"
        score: 1
      c:
        text: "Formal source-grounding-data-contract.yaml enforces KB citation with validation and accuracy metrics"
        score: 3
    recommendation:
      if_a: "Implement source-grounding-data-contract.yaml requiring every claim to cite KB file and original URL."
      if_b: "Add automated validation for source citation accuracy."
      if_c: "Monitor citation accuracy in production; alert on degradation."

  - id: F04
    category: agentic_governance
    question: "Do you have prompt security measures against prompt injection and jailbreaks?"
    options:
      a:
        text: "No prompt security; user inputs are passed directly to the model"
        score: 0
      b:
        text: "Basic input sanitisation exists but no structured prompt security framework"
        score: 1
      c:
        text: "Comprehensive prompt security with input validation, output filtering, and adversarial testing"
        score: 3
    recommendation:
      if_a: "Implement prompt security per 03-runtime-governance/prompt-security.md immediately."
      if_b: "Add structured output validation and adversarial test cases."
      if_c: "Continuous red-teaming with automated adversarial test suites."

  - id: F05
    category: agentic_governance
    question: "Do you manage agent identity lifecycle (provisioning, rotation, deprovisioning)?"
    options:
      a:
        text: "No agent identity management; agents reuse developer credentials"
        score: 0
      b:
        text: "Agents have dedicated identities but no rotation or deprovisioning process"
        score: 1
      c:
        text: "Full NHI lifecycle: provisioning, credential rotation, RBAC, and deprovisioning per agent"
        score: 3
    recommendation:
      if_a: "Implement NHI management per 05-cross-cutting/machine-identity-nhi.md."
      if_b: "Add automated credential rotation and deprovisioning workflows."
      if_c: "Integrate NHI inventory with agent registry and CMDB."

  - id: F06
    category: agentic_governance
    question: "Do you track and version agent prompts, skill manifests, and system instructions?"
    options:
      a:
        text: "No versioning; prompts and manifests are edited in-place without history"
        score: 0
      b:
        text: "Git versioning exists but no structured change management or approval process"
        score: 1
      c:
        text: "All prompts, manifests, and system instructions are versioned in git with change approval and rollback capability"
        score: 3
    recommendation:
      if_a: "Move all prompts and manifests to version control immediately."
      if_b: "Add change approval workflow and automated rollback triggers."
      if_c: "Integrate prompt versioning with deployment pipeline; require eval pass before promotion."

  - id: F07
    category: agentic_governance
    question: "Do you have a knowledge-base freshness and provenance contract?"
    options:
      a:
        text: "No KB freshness tracking; articles are cached indefinitely without validation"
        score: 0
      b:
        text: "KB articles have timestamps but no formal freshness SLA or staleness remediation"
        score: 1
      c:
        text: "Formal KB freshness contract with staleness SLA (e.g., 90 days), automated detection, and refresh workflow"
        score: 3
    recommendation:
      if_a: "Implement kb-freshness-provenance-contract.md with maximum staleness thresholds."
      if_b: "Add automated staleness detection and alerting."
      if_c: "Integrate KB freshness metrics into operational dashboards and periodic reviews."

# =============================================================================
# Scoring System
# =============================================================================

scoring:
  max_possible_score: 81  # 27 questions x max 3 points each
  tiers:
    minimal:
      range: "0-20"
      label: "Getting Started"
      description: |
        Your organisation is in the early stages of AI governance. Start with
        foundational documents and focus on the highest-risk gaps identified
        by individual question recommendations.
      recommended_path:
        - "01-discovery-governance/templates/governance-charter.md"
        - "05-cross-cutting/governance-roles-raci.md"
        - "05-cross-cutting/regulatory-reference-index.md"
        - "01-discovery-governance/templates/risk-management-plan.md"
      estimated_effort: "3-6 months to reach Standard tier"

    standard:
      range: "21-54"
      label: "Building Maturity"
      description: |
        Your organisation has foundational governance in place but gaps remain
        in technical controls, regulatory coverage, or organisational readiness.
        Focus on closing the specific gaps identified.
      recommended_path:
        - "03-runtime-governance/guides/integrating-nemo-guardrails.md"
        - "03-runtime-governance/guides/integrating-guardrails-ai.md"
        - "04-operational-governance/guides/traceability-with-langchain.md"
        - "04-operational-governance/guides/red-teaming-ai-systems.md"
        - "05-cross-cutting/machine-identity-nhi.md"
      estimated_effort: "2-4 months to reach Comprehensive tier"

    comprehensive:
      range: "55-81"
      label: "Advanced Governance"
      description: |
        Your organisation has mature AI governance. Focus on continuous
        improvement, advanced monitoring, and staying ahead of regulatory
        changes.
      recommended_path:
        - "04-operational-governance/templates/drift-detection-runbook.md"
        - "04-operational-governance/guides/red-teaming-ai-systems.md (continuous mode)"
        - "05-cross-cutting/data-provenance-and-lineage.md"
        - "06-compliance/trackers/ (all regulation trackers)"
      estimated_effort: "Ongoing continuous improvement"

  risk_tier_determination:
    description: |
      Your risk tier is determined by the HIGHEST score in the Risk Exposure
      category (questions Q06-Q10). Even if your overall score is low, a high
      risk-exposure score demands more rigorous controls.
    logic:
      - condition: "Any Risk Exposure question scored 3"
        tier: "High Risk"
        implication: "Full framework adoption mandatory. All EU AI Act high-risk obligations apply."
      - condition: "Maximum Risk Exposure score is 2"
        tier: "Elevated Risk"
        implication: "Standard-plus path. Prioritise guardrails, observability, and third-party risk."
      - condition: "Maximum Risk Exposure score is 1"
        tier: "Moderate Risk"
        implication: "Standard path with focus on proportionate controls."
      - condition: "All Risk Exposure scores are 0"
        tier: "Low Risk"
        implication: "Minimal path with transparency and basic monitoring."
    cumulative_risk_modifier:
      description: |
        If 3 or more Risk Exposure questions score ≥2, elevate the determined
        risk tier by one level (e.g., Moderate → Elevated). This captures
        cumulative risk from multiple moderate-risk factors.
      trigger: "Count of Q06-Q10 with score ≥2 ≥ 3"
      action: "Elevate tier by one level (capped at High Risk)"

# =============================================================================
# Next Steps After Assessment
# =============================================================================

# =============================================================================
# Evidence Validation
# =============================================================================

evidence_validation:
  description: |
    This assessment is self-reported. To increase reliability, provide objective
    evidence for at least one question per category. Evidence examples:
  by_category:
    governance_maturity:
      - "Link to signed governance charter document"
      - "Screenshot of RACI matrix in shared drive"
      - "Meeting invite for scheduled management review"
    risk_exposure:
      - "Documented risk classification for each agent"
      - "DPIA document with approval date"
      - "Screenshot of agent-customer interaction logs"
    regulatory_requirements:
      - "Regulatory reference index with applicable regulations highlighted"
      - "Compliance tracker export"
      - "DPIA approval email or document"
    technical_capability:
      - "Screenshot of tracing dashboard (LangSmith, Langfuse, etc.)"
      - "Guardrail configuration file"
      - "Red-team test report with dates and findings"
      - "Data lineage diagram or export"
    organisational_readiness:
